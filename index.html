<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input NIK</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #dcdcdc, #bfbfbf);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #0d0d0d;
    padding: 40px;
    width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    color: white;
}

.card h1 {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
}

.card p {
    text-align: center;
    font-size: 12px;
    color: #bbbbbb;
    margin-bottom: 25px;
}

label {
    font-size: 14px;
    margin-bottom: 8px;
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: white;
    margin-bottom: 20px;
}

input:focus {
    outline: none;
    border: 1px solid #4da6ff;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(to right, #3a3a3a, #2a2a2a);
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(to right, #4da6ff, #0066cc);
}
</style>

</head>
<body>

<div class="card">
    <h1>INPUT NIK SEBELUM REQUEST</h1>
    <p>Periode request dibuka tanggal 1–15 setiap bulan</p>

    <form onsubmit="return cekNIK()">
        <label>Masukkan NIK:</label>
        <input type="text" id="nik" placeholder="Contoh: 2012022847" required>

        <button type="submit">Cek Nama & Group</button>
    </form>
</div>

<script>
function cekNIK() {
    const nik = document.getElementById("nik").value;
    alert("NIK yang dimasukkan: " + nik);
    return false; // supaya tidak reload halaman
}
</script>

</body>
</html>
