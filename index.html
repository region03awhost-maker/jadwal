<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input NIK</title>

<style>
body {
    height: 100vh;
    background: linear-gradient(135deg, #dcdcdc, #bfbfbf);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

.card {
    background: #0d0d0d;
    padding: 40px;
    width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    color: white;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.result {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">
    <h3>INPUT NIK SEBELUM REQUEST</h3>
    <p>Periode request 1–15</p>

    <form id="formNIK">
        <input type="text" id="nik" placeholder="Masukkan NIK" required>
        <button type="submit">Cek Nama & Group</button>
    </form>

    <div class="result" id="resultBox"></div>
</div>

<script>

// ====== GANTI LINK DI SINI ======
const scriptURL = "https://script.google.com/home/projects/1ps_kvWom0gZ1GeECTlMfzOJNQTzaw4YB_AG_z-iMEKZevFjty-YD3mwB/edit";

// Validasi hanya angka
document.getElementById("nik").addEventListener("input", function () {
    this.value = this.value.replace(/[^0-9]/g, "");
});

document.getElementById("formNIK").addEventListener("submit", function(e) {
    e.preventDefault();

    const nik = document.getElementById("nik").value;
    const resultBox = document.getElementById("resultBox");

    resultBox.innerHTML = "Mengecek...";

    fetch(scriptURL + "?nik=" + nik)
        .then(res => res.json())
        .then(data => {
            if (data.status === "found") {
                resultBox.innerHTML =
                    "Nama: " + data.nama + "<br>Group: " + data.group;
            } else {
                resultBox.innerHTML = "NIK tidak ditemukan";
            }
        })
        .catch(err => {
            resultBox.innerHTML = "Gagal koneksi";
        });
});

</script>

</body>
</html>
