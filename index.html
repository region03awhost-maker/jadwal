<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input NIK</title>

<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #dcdcdc, #bfbfbf);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #0d0d0d;
    padding: 40px 35px;
    width: 420px;
    border-radius: 18px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
    color: white;
}

.card h3 {
    margin: 0 0 10px 0;
    font-size: 20px;
    font-weight: 600;
}

.card p {
    margin: 0 0 25px 0;
    font-size: 14px;
    color: #cfcfcf;
}

form {
    display: flex;
    flex-direction: column;
    align-items: center;
}

input {
    width: 100%;
    height: 45px;
    padding: 0 15px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    margin-bottom: 15px;
}

button {
    width: 100%;
    height: 45px;
    border-radius: 8px;
    border: none;
    background: #e0e0e0;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    background: #4da6ff;
    color: white;
}

.result {
    margin-top: 20px;
    font-size: 15px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="card">
    <h3>INPUT NIK SEBELUM REQUEST</h3>
    <p>Periode request 1–15</p>

    <form id="formNIK">
        <input type="text" id="nik" placeholder="Masukkan NIK" required>
        <button type="submit">Cek Nama & Group</button>
    </form>

    <div class="result" id="resultBox"></div>
</div>

<script>

// ====== GANTI LINK DI SINI ======
const scriptURL = "https://script.google.com/macros/s/AKfycbypDY_nyCbEN3r0V3FCstpo1QE9cYJik_N8-mqDeZEJjutT3fDN6KBbw7aR0jhJyJvyxg/exec";

// Validasi hanya angka
document.getElementById("nik").addEventListener("input", function () {
    this.value = this.value.replace(/[^0-9]/g, "");
});

document.getElementById("formNIK").addEventListener("submit", function(e) {
    e.preventDefault();

    const nik = document.getElementById("nik").value;
    const resultBox = document.getElementById("resultBox");

    resultBox.innerHTML = "Mengecek...";

    fetch(scriptURL + "?nik=" + nik)
        .then(res => res.json())
        .then(data => {
            if (data.status === "found") {
                resultBox.innerHTML =
                    "Nama: " + data.nama + "<br>Group: " + data.group;
            } else {
                resultBox.innerHTML = "NIK tidak ditemukan";
            }
        })
        .catch(err => {
            resultBox.innerHTML = "Gagal koneksi";
        });
});

</script>

</body>
</html>
